<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>LMMs-Lab Writer Course Evaluator</title>
  <style>
    body {
      font-family: monospace;
      background-color: #f5f5f0;
      color: #000000;
      width: 320px;
      margin: 0;
      padding: 16px;
      border: 1px solid #e5e5e5;
    }
    h1 {
      font-size: 16px;
      margin-top: 0;
      margin-bottom: 16px;
      text-transform: uppercase;
      border-bottom: 1px solid #000000;
      padding-bottom: 8px;
    }
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .import-row {
      display: flex;
      gap: 8px;
    }
    button, select {
      font-family: monospace;
      font-size: 14px;
      padding: 8px 12px;
      border: 1px solid #000000;
      background-color: #ffffff;
      color: #000000;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000000;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button:active, select:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0 #000000;
    }
    button.primary {
      background-color: #ff5500;
      color: #ffffff;
      font-weight: bold;
      text-transform: uppercase;
      border-color: #ff5500;
      box-shadow: 2px 2px 0 #000000;
    }
    select {
      flex-grow: 1;
      appearance: none;
      border-radius: 0;
    }
    button.import-btn {
      flex-shrink: 0;
      width: 120px;
    }
    #status {
      margin-top: 16px;
      font-size: 12px;
      color: #ff5500;
      font-weight: bold;
      min-height: 14px;
    }
  </style>
</head>
<body>
  <h1>Course Evaluator</h1>
  
  <div class="button-group">
    <div class="import-row">
      <button id="importBtn" class="primary import-btn">Import...</button>
      <select id="scheduleSelect">
        <option value="one-time">One Time</option>
        <option value="every-day">Every Day</option>
        <option value="weekly">Weekly</option>
        <option value="periodically">Periodically</option>
      </select>
    </div>
    
    <button id="settingsBtn">Settings</button>
    <button id="logsBtn">View Logs</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
