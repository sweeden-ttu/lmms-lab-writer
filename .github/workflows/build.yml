name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target: ""
          - name: macOS (ARM64)
            os: macos-latest
            target: aarch64-apple-darwin
          - name: macOS (x64)
            os: macos-15-intel
            target: x86_64-apple-darwin
          - name: Windows
            os: windows-latest
            target: ""
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Prepare macOS bundle tools
        if: startsWith(matrix.os, 'macos')
        shell: bash
        run: |
          DEVELOPER_BIN="$(xcode-select -p)/usr/bin"
          echo "$DEVELOPER_BIN" >> "$GITHUB_PATH"
          echo "Using Xcode developer tools from: $DEVELOPER_BIN"
          xcrun --find SetFile
          xcrun --find Rez
          command -v hdiutil
          command -v osascript

      - run: pnpm install --frozen-lockfile

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs --from-tag ${{ github.ref_name }}

      - name: Build Tauri app
        run: pnpm --filter @lmms-lab/writer-desktop tauri build --ci -v ${{ matrix.target && format('--target {0}', matrix.target) }}

      - name: Build PKG installer (macOS release)
        if: startsWith(matrix.os, 'macos') && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.target }}
        run: ./scripts/build-pkg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**
          retention-days: 7

  release-github:
    name: Publish GitHub Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          overwrite_files: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.pkg
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.app.tar.gz
            release-artifacts/**/*.exe
            release-artifacts/**/*.msi
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.rpm
            release-artifacts/**/*.sig
            release-artifacts/**/*.json
